<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 • Page Not Found</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#141414;
    color:white;
    font-family:'DM Sans',sans-serif;
    overflow:hidden;
}

.background{
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at top,#d6b25d18,transparent 45%),
        radial-gradient(circle at bottom,#ffffff08,transparent 45%);
}

.container{
    position:relative;
    z-index:2;

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

    padding:20px;
}

.card{

    max-width:700px;
    padding:70px 60px;

    background:rgba(255,255,255,.05);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.08);

    border-radius:28px;

    box-shadow:0 25px 80px rgba(0,0,0,.55);
}

.code{

    font-family:'Playfair Display',serif;
    font-size:140px;
    line-height:1;
    color:#d6b25d;

    margin-bottom:15px;
}

h1{

    font-family:'Playfair Display',serif;
    font-size:46px;
    font-weight:400;

    margin-bottom:20px;
}

p{

    color:rgba(255,255,255,.7);

    line-height:1.8;
    font-size:17px;

    max-width:520px;

    margin:auto auto 40px;
}

.buttons{

    display:flex;
    justify-content:center;
    gap:18px;
    flex-wrap:wrap;
}

.btn{

    display:inline-block;

    padding:14px 34px;

    border-radius:999px;

    text-decoration:none;

    transition:.35s;

    font-size:14px;
    letter-spacing:.4px;
}

.primary{

    background:#d6b25d;
    color:#111;
}

.primary:hover{

    transform:translateY(-4px);

    box-shadow:0 15px 40px rgba(214,178,93,.35);
}

.secondary{

    color:white;

    border:1px solid rgba(255,255,255,.15);

    background:rgba(255,255,255,.04);
}

.secondary:hover{

    background:rgba(255,255,255,.08);

    transform:translateY(-4px);
}

.code{
    animation:float 4s ease-in-out infinite;
}

@keyframes float{

    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-12px);
    }
}

@media(max-width:700px){

    .card{
        padding:50px 30px;
    }

    .code{
        font-size:90px;
    }

    h1{
        font-size:34px;
    }

}

</style>

</head>

<body>

<div class="background"></div>

<div class="container">

    <div class="card">

        <div class="code">404</div>

        <h1>Page Not Found</h1>

        <p>
            The page you're looking for doesn't exist,
            has been moved, or is temporarily unavailable.
        </p>

        <div class="buttons">

            <a href="/" class="btn primary">
                Go Home
            </a>

            <a href="javascript:history.back()" class="btn secondary">
                Go Back
            </a>

        </div>

    </div>

</div>

</body>
</html>
